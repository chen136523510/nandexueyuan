<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>男德学院 AI 助手 · 测评</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #1a1a2e; color: #fff; padding: 16px 24px; font-size: 18px; font-weight: 600; }
    .login-bar { background: #fff; padding: 12px 24px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #e8e8e8; }
    .login-bar input { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
    .login-bar button { padding: 6px 16px; background: #1677ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .login-bar button:hover { background: #4096ff; }
    #loginStatus { font-size: 13px; color: #52c41a; }
    .chat-area { flex: 1; overflow-y: auto; padding: 24px; max-width: 800px; width: 100%; margin: 0 auto; }
    .msg { padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; max-width: 80%; word-break: break-word; white-space: pre-wrap; line-height: 1.6; }
    .msg.user { background: #1677ff; color: #fff; margin-left: auto; }
    .msg.bot { background: #fff; color: #333; border: 1px solid #e8e8e8; }
    .msg .intent { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; background: #f0f0f0; color: #888; }
    .msg.bot .intent { background: #e6f4ff; color: #1677ff; }
    .input-area { background: #fff; padding: 16px 24px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; max-width: 800px; width: 100%; margin: 0 auto; }
    #question { flex: 1; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; }
    #question:focus { border-color: #1677ff; }
    #askBtn { padding: 10px 24px; background: #1677ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
    #askBtn:hover { background: #4096ff; }
    #askBtn:disabled { background: #bbb; cursor: not-allowed; }
    .suggestions { padding: 8px 24px; max-width: 800px; margin: 0 auto; }
    .suggestions button { padding: 4px 12px; margin-right: 8px; background: #f0f0f0; border: 1px solid #d9d9d9; border-radius: 12px; cursor: pointer; font-size: 12px; color: #666; }
    .suggestions button:hover { background: #e6f4ff; color: #1677ff; border-color: #91caff; }
  </style>
</head>
<body>
  <div class="header">男德学院 AI 助手 · 测评</div>
  <div class="login-bar">
    <input id="username" placeholder="用户名" value="chenzijian">
    <input id="password" type="password" placeholder="密码" value="admin123456">
    <button onclick="login()">登录</button>
    <span id="loginStatus"></span>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="suggestions" id="suggestions">
    <button onclick="quickAsk('群里发言最多的人是谁')">发言最多?</button>
    <button onclick="quickAsk('饶志锐发了多少条消息')">某人发言数?</button>
    <button onclick="quickAsk('2024年群里有多少条消息')">年度统计?</button>
    <button onclick="quickAsk('你好，介绍一下你自己')">闲聊</button>
  </div>
  <div class="input-area">
    <input id="question" placeholder="输入问题，回车提问..." disabled>
    <button id="askBtn" onclick="ask()" disabled>提问</button>
  </div>

  <script>
    let token = null

    async function login() {
      loginStatus.textContent = '登录中...'
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username.value, password: password.value })
        })
        const data = await r.json()
        if (data.code === 0) {
          token = data.data.token
          loginStatus.textContent = '✓ 已登录(' + data.data.user.nickname + ')'
          question.disabled = false
          askBtn.disabled = false
          question.focus()
          addMsg('登录成功！可以开始提问了。试试下方的推荐问题，或自己输入。', 'bot')
        } else {
          loginStatus.textContent = '✗ ' + data.message
        }
      } catch (e) {
        loginStatus.textContent = '✗ 网络错误'
      }
    }

    function addMsg(text, role, intent) {
      const div = document.createElement('div')
      div.className = 'msg ' + role
      div.textContent = text
      if (intent) {
        const tag = document.createElement('div')
        tag.className = 'intent'
        tag.textContent = '意图: ' + intent
        div.appendChild(tag)
      }
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
    }

    function quickAsk(q) {
      question.value = q
      ask()
    }

    async function ask() {
      const q = question.value.trim()
      if (!q || !token) return
      addMsg(q, 'user')
      question.value = ''
      askBtn.disabled = true
      askBtn.textContent = '思考中...'
      try {
        const r = await fetch('/api/chat/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ question: q })
        })
        const data = await r.json()
        if (data.code === 0) {
          addMsg(data.data.answer, 'bot', data.data.intent)
        } else {
          addMsg('⚠ ' + data.message, 'bot')
        }
      } catch (e) {
        addMsg('⚠ 网络错误: ' + e.message, 'bot')
      }
      askBtn.disabled = false
      askBtn.textContent = '提问'
      question.focus()
    }

    question.addEventListener('keydown', e => { if (e.key === 'Enter') ask() })
  </script>
</body>
</html>
